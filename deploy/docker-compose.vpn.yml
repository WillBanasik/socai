# Mullvad VPN sidecar via gluetun.
#
# Provides:
#   1. HTTP proxy on :8888 for Playwright + requests (web_capture, web_search)
#   2. Container network namespace for sandbox/browser Docker containers
#
# Setup:
#   1. Get a Mullvad WireGuard config:
#        - Go to https://mullvad.net/en/account/wireguard-config
#        - Generate a key, note the private key + address
#   2. Copy deploy/.env.vpn.example to deploy/.env.vpn and fill in values
#   3. Start:  docker compose -f deploy/docker-compose.vpn.yml up -d
#   4. Verify: curl -x http://127.0.0.1:8888 https://am.i.mullvad.net/connected
#   5. Add to socai .env:
#        SOCAI_OPSEC_PROXY=http://127.0.0.1:8888
#
# Ports exposed on host:
#   8888  — HTTP proxy (used by SOCAI_OPSEC_PROXY for Playwright/requests)
#
# Sandbox/browser containers use --network=container:gluetun to share
# gluetun's network namespace directly (no proxy needed at container level).

services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "8888:8888"   # HTTP proxy for Playwright/requests
    env_file:
      - .env.vpn
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9999/v1/openvpn/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
