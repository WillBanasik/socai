<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>socai — Case Detail</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; padding: 1.5rem; }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
  .topbar h1 { font-size: 1.3rem; }
  .topbar h1 span { color: #38bdf8; }
  .topbar nav { display: flex; gap: 0.75rem; align-items: center; }
  .topbar nav a, .topbar nav button { background: none; border: 1px solid #334155; color: #94a3b8; padding: 0.4rem 0.8rem; border-radius: 6px; cursor: pointer; text-decoration: none; font-size: 0.85rem; }
  .topbar nav a:hover, .topbar nav button:hover { color: #e2e8f0; border-color: #64748b; }
  .btn-primary { background: #2563eb !important; color: #fff !important; border-color: #2563eb !important; }
  .btn-primary:hover { background: #1d4ed8 !important; }
  .btn-chat { background: #238636 !important; color: #fff !important; border-color: #238636 !important; }
  .btn-chat:hover { background: #2ea043 !important; }

  /* Case header */
  .case-header { margin-bottom: 1.25rem; }
  .case-header .case-id { font-size: 0.85rem; color: #38bdf8; font-weight: 600; margin-bottom: 0.25rem; }
  .case-header .case-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; line-height: 1.3; }
  .case-header .badges { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.35rem; }
  .case-header .meta-line { font-size: 0.8rem; color: #64748b; }

  /* Grid layout */
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1.25rem; }
  @media (max-width: 768px) { .detail-grid { grid-template-columns: 1fr; } }
  .full-width { grid-column: 1 / -1; }

  /* Panel */
  .panel { background: #1e293b; border-radius: 10px; padding: 1rem 1.25rem; border: 1px solid #334155; }
  .panel h2 { font-size: 0.85rem; color: #64748b; margin-bottom: 0.6rem; text-transform: uppercase; letter-spacing: 0.04em; }

  /* IOC list */
  .ioc-group { margin-bottom: 0.5rem; }
  .ioc-group-label { font-size: 0.75rem; color: #94a3b8; font-weight: 600; margin-bottom: 0.2rem; }
  .ioc-item { font-family: 'Consolas', 'Monaco', monospace; font-size: 0.78rem; padding: 0.15rem 0; color: #e2e8f0; word-break: break-all; }
  .ioc-item.malicious { color: #f87171; }
  .ioc-item.suspicious { color: #fb923c; }
  .ioc-more { font-size: 0.72rem; color: #64748b; cursor: pointer; }
  .ioc-more:hover { color: #94a3b8; }

  /* Verdicts */
  .verdict-section { margin-bottom: 0.5rem; }
  .verdict-label { font-size: 0.75rem; font-weight: 600; margin-bottom: 0.2rem; }
  .verdict-label.high { color: #f87171; }
  .verdict-label.review { color: #fb923c; }
  .verdict-label.clean { color: #4ade80; }
  .verdict-item { font-family: 'Consolas', 'Monaco', monospace; font-size: 0.78rem; padding: 0.1rem 0; word-break: break-all; }

  /* Findings */
  .finding { border-bottom: 1px solid #334155; padding: 0.4rem 0; }
  .finding:last-child { border-bottom: none; }
  .finding-type { font-size: 0.7rem; color: #38bdf8; text-transform: uppercase; font-weight: 600; }
  .finding-summary { font-size: 0.82rem; margin-top: 0.1rem; }
  .finding-detail { font-size: 0.75rem; color: #94a3b8; margin-top: 0.1rem; }

  /* Report */
  .report-content { font-size: 0.82rem; line-height: 1.5; max-height: 500px; overflow-y: auto; }
  .report-content h1 { font-size: 1rem; color: #38bdf8; margin: 0.5rem 0 0.3rem; }
  .report-content h2 { font-size: 0.92rem; color: #38bdf8; margin: 0.4rem 0 0.2rem; }
  .report-content h3 { font-size: 0.88rem; color: #94a3b8; margin: 0.3rem 0 0.15rem; }
  .report-content p { margin-bottom: 0.3rem; }
  .report-content code { background: #0f172a; padding: 0.1rem 0.25rem; border-radius: 3px; font-size: 0.85em; color: #fb923c; }
  .report-content pre { background: #0f172a; padding: 0.4rem; border-radius: 4px; overflow-x: auto; font-size: 0.78rem; margin: 0.2rem 0; }
  .report-content ul, .report-content ol { margin: 0.2rem 0 0.3rem 1.2rem; }
  .report-content table { width: 100%; border-collapse: collapse; margin: 0.2rem 0; }
  .report-content th, .report-content td { border: 1px solid #334155; padding: 0.2rem 0.4rem; font-size: 0.78rem; text-align: left; }
  .report-content th { background: #0f172a; color: #94a3b8; }

  /* Investigation log — timestamps */
  .log-ts { font-size: 0.68rem; color: #475569; font-family: 'Consolas', 'Monaco', monospace; margin-bottom: 0.1rem; }
  .log-ts .duration { color: #64748b; margin-left: 0.4rem; }

  /* Investigation log — action groups */
  .action-group { background: #0f172a; border: 1px solid #334155; border-radius: 6px; overflow: hidden; margin-bottom: 0.35rem; }
  .action-group-header { display: flex; align-items: center; gap: 0.5rem; padding: 0.45rem 0.7rem; cursor: pointer; user-select: none; }
  .action-group-header:hover { background: #1a2540; }
  .action-group-chevron { font-size: 0.7rem; color: #64748b; transition: transform 0.15s; width: 1rem; text-align: center; }
  .action-group.open .action-group-chevron { transform: rotate(90deg); }
  .action-group-label { font-size: 0.8rem; color: #60a5fa; font-weight: 600; }
  .action-group-count { font-size: 0.7rem; color: #64748b; margin-left: auto; }
  .action-group-items { display: none; border-top: 1px solid #334155; padding: 0.3rem 0.7rem; }
  .action-group.open .action-group-items { display: block; }
  .action-item { font-size: 0.78rem; color: #94a3b8; padding: 0.2rem 0; border-bottom: 1px solid #1e293b; }
  .action-item:last-child { border-bottom: none; }

  /* Investigation log — analysis entries */
  .log-entry { border-bottom: 1px solid #334155; padding: 0.4rem 0; margin-bottom: 0.1rem; }
  .log-entry:last-child { border-bottom: none; }
  .log-text { font-size: 0.8rem; color: #e2e8f0; line-height: 1.4; white-space: pre-wrap; word-break: break-word; }
  .log-scroll { max-height: 500px; overflow-y: auto; }

  /* KQL queries */
  .kql-card { background: #0f172a; border: 1px solid #334155; border-radius: 6px; padding: 0.6rem 0.8rem; margin-bottom: 0.5rem; }
  .kql-card:last-child { margin-bottom: 0; }
  .kql-meta { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 0.3rem; }
  .kql-badge { font-size: 0.65rem; padding: 0.1rem 0.4rem; border-radius: 4px; font-weight: 600; text-transform: uppercase; }
  .kql-badge.executed { background: #166534; color: #4ade80; }
  .kql-badge.suggested { background: #1e3a5f; color: #60a5fa; }
  .kql-workspace { font-size: 0.7rem; color: #64748b; }
  .kql-code { font-family: 'Consolas', 'Monaco', monospace; font-size: 0.75rem; color: #e2e8f0; white-space: pre-wrap; word-break: break-all; line-height: 1.4; }
  .kql-scroll { max-height: 500px; overflow-y: auto; }

  .empty { color: #475569; font-style: italic; font-size: 0.82rem; }
  .loading { text-align: center; color: #64748b; padding: 3rem; font-size: 0.95rem; }
</style>
</head>
<body>
<div class="topbar">
  <h1><span>soc</span>ai</h1>
  <nav>
    <a href="/ui/dashboard.html">Dashboard</a>
    <a href="/ui/cases.html">Cases</a>
    <a id="chatLink" class="btn-chat">Open in Chat</a>
    <span id="userEmail" style="color:#64748b;font-size:0.85rem;"></span>
    <button onclick="logout()">Logout</button>
  </nav>
</div>

<div id="content">
  <div class="loading">Loading case...</div>
</div>

<script src="/ui/app.js?v=2"></script>
<script>
  requireAuth();

  const params = new URLSearchParams(window.location.search);
  const caseId = params.get('case');

  if (!caseId) {
    document.getElementById('content').innerHTML = '<div class="loading">No case ID specified.</div>';
  }

  document.getElementById('chatLink').href = '/ui/case.html?case=' + encodeURIComponent(caseId);
  document.title = 'socai — ' + caseId;

  function renderIOCs(iocs) {
    if (!iocs || !iocs.iocs) return '<span class="empty">No IOCs extracted.</span>';

    const data = iocs.iocs;
    const typeLabels = {
      ipv4: 'IP Addresses', domain: 'Domains', url: 'URLs',
      email: 'Email Addresses', md5: 'MD5', sha1: 'SHA1', sha256: 'SHA256', cve: 'CVEs'
    };
    let html = '';
    for (const [type, values] of Object.entries(data)) {
      if (!Array.isArray(values) || !values.length) continue;
      const label = typeLabels[type] || type;
      const show = values.slice(0, 10);
      html += '<div class="ioc-group"><div class="ioc-group-label">' + esc(label) + ' (' + values.length + ')</div>';
      show.forEach(v => {
        html += '<div class="ioc-item">' + esc(typeof v === 'string' ? v : v.value || JSON.stringify(v)) + '</div>';
      });
      if (values.length > 10) {
        html += '<div class="ioc-more">+ ' + (values.length - 10) + ' more</div>';
      }
      html += '</div>';
    }
    return html || '<span class="empty">No IOCs extracted.</span>';
  }

  function renderVerdicts(verdicts) {
    if (!verdicts) return '<span class="empty">No verdict data.</span>';
    let html = '';

    const high = verdicts.high_priority || [];
    const review = verdicts.needs_review || [];
    const clean = verdicts.clean || [];

    if (high.length) {
      html += '<div class="verdict-section"><div class="verdict-label high">High Priority (' + high.length + ')</div>';
      high.forEach(v => { html += '<div class="verdict-item" style="color:#f87171;">' + esc(typeof v === 'string' ? v : v.ioc || JSON.stringify(v)) + '</div>'; });
      html += '</div>';
    }
    if (review.length) {
      html += '<div class="verdict-section"><div class="verdict-label review">Needs Review (' + review.length + ')</div>';
      review.slice(0, 10).forEach(v => { html += '<div class="verdict-item" style="color:#fb923c;">' + esc(typeof v === 'string' ? v : v.ioc || JSON.stringify(v)) + '</div>'; });
      if (review.length > 10) html += '<div class="ioc-more">+ ' + (review.length - 10) + ' more</div>';
      html += '</div>';
    }
    if (clean.length) {
      html += '<div class="verdict-section"><div class="verdict-label clean">Clean (' + clean.length + ')</div>';
      html += '<div class="verdict-item" style="color:#4ade80;">(' + clean.length + ' IOCs assessed as clean)</div>';
      html += '</div>';
    }

    if (!html) {
      const count = verdicts.ioc_count || 0;
      html = '<span class="empty">' + (count ? count + ' IOCs assessed — no high-priority findings.' : 'No verdict data.') + '</span>';
    }
    return html;
  }

  function renderFindings(findings) {
    if (!findings || !findings.length) return '<span class="empty">No findings recorded.</span>';
    return findings.map(f =>
      '<div class="finding">' +
        '<div class="finding-type">' + esc(f.type || 'general') + '</div>' +
        '<div class="finding-summary">' + esc(f.summary || '') + '</div>' +
        (f.detail ? '<div class="finding-detail">' + esc(f.detail) + '</div>' : '') +
      '</div>'
    ).join('');
  }

  // Format an ISO timestamp for display
  function fmtTs(iso) {
    if (!iso) return '';
    try {
      const d = new Date(iso);
      if (isNaN(d)) return '';
      return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }) +
        ' ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    } catch { return ''; }
  }

  // Compute duration string between two ISO timestamps
  function fmtDuration(startIso, endIso) {
    if (!startIso || !endIso) return '';
    try {
      const ms = new Date(endIso) - new Date(startIso);
      if (isNaN(ms) || ms < 0) return '';
      const secs = Math.round(ms / 1000);
      if (secs < 60) return secs + 's';
      const mins = Math.floor(secs / 60);
      const remSecs = secs % 60;
      if (mins < 60) return mins + 'm ' + remSecs + 's';
      const hrs = Math.floor(mins / 60);
      return hrs + 'h ' + (mins % 60) + 'm';
    } catch { return ''; }
  }

  // Are two timestamps within the given window (ms)?
  function withinWindow(ts1, ts2, windowMs) {
    if (!ts1 || !ts2) return true; // no timestamps — treat as same group
    try {
      return Math.abs(new Date(ts2) - new Date(ts1)) <= windowMs;
    } catch { return true; }
  }

  // Render a timestamp line, optionally with duration
  function tsHtml(ts, duration) {
    if (!ts) return '';
    const formatted = fmtTs(ts);
    if (!formatted) return '';
    return '<div class="log-ts">' + esc(formatted) +
      (duration ? '<span class="duration">' + esc(duration) + '</span>' : '') +
    '</div>';
  }

  function renderInvestigationLog(log) {
    if (!log || !log.length) return '<span class="empty">No investigation history available.</span>';

    const CLOSE_WINDOW = 5 * 60 * 1000; // 5 minutes

    // Walk chronologically, grouping consecutive same-tool actions
    const segments = [];
    let i = 0;
    while (i < log.length) {
      const e = log[i];
      if (e.type === 'action') {
        const tool = e.tool || '';
        const group = [e];
        while (i + 1 < log.length && log[i + 1].type === 'action' && (log[i + 1].tool || '') === tool) {
          i++;
          group.push(log[i]);
        }
        segments.push({ kind: 'action-group', tool: tool, items: group });
      } else {
        segments.push({ kind: 'analysis', entry: e });
      }
      i++;
    }

    // Merge adjacent segments that share the same timestamp (within window)
    // into timestamp groups for display
    let html = '<div class="log-scroll">';
    let lastShownTs = '';
    let gIdx = 0;

    for (const seg of segments) {
      const segTs = seg.kind === 'action-group' ? (seg.items[0].ts || '') : (seg.entry.ts || '');

      // Show timestamp if it differs from the last shown (beyond window)
      if (segTs && !withinWindow(lastShownTs, segTs, CLOSE_WINDOW)) {
        // Calculate duration from last timestamp to this one
        const dur = lastShownTs ? fmtDuration(lastShownTs, segTs) : '';
        const durLabel = dur ? '(+' + dur + ')' : '';
        html += tsHtml(segTs, durLabel);
        lastShownTs = segTs;
      } else if (segTs && !lastShownTs) {
        // First timestamp
        html += tsHtml(segTs, '');
        lastShownTs = segTs;
      }

      if (seg.kind === 'action-group') {
        const label = seg.items[0].text.replace(/ \(.*\)$/, '');
        if (seg.items.length === 1) {
          html += '<div class="action-group open">' +
            '<div class="action-group-header" style="cursor:default">' +
              '<span class="action-group-label">' + esc(seg.items[0].text) + '</span>' +
            '</div></div>';
        } else {
          const gid = 'ag' + (gIdx++);
          html += '<div class="action-group" id="' + gid + '">' +
            '<div class="action-group-header" onclick="this.parentElement.classList.toggle(\'open\')">' +
              '<span class="action-group-chevron">&#9654;</span>' +
              '<span class="action-group-label">' + esc(label) + '</span>' +
              '<span class="action-group-count">' + seg.items.length + '&times;</span>' +
            '</div>' +
            '<div class="action-group-items">' +
              seg.items.map(a => '<div class="action-item">' + esc(a.text) + '</div>').join('') +
            '</div>' +
          '</div>';
        }
      } else {
        html += '<div class="log-entry"><div class="log-text">' + esc(seg.entry.text) + '</div></div>';
      }
    }
    html += '</div>';
    return html;
  }

  function renderKQLQueries(queries) {
    if (!queries || !queries.length) return '<span class="empty">No KQL queries in this investigation.</span>';
    return '<div class="kql-scroll">' + queries.map(q =>
      '<div class="kql-card">' +
        '<div class="kql-meta">' +
          '<span class="kql-badge ' + esc(q.source) + '">' + esc(q.source) + '</span>' +
          (q.workspace ? '<span class="kql-workspace">Workspace: ' + esc(q.workspace) + '</span>' : '') +
        '</div>' +
        '<div class="kql-code">' + esc(q.query) + '</div>' +
      '</div>'
    ).join('') + '</div>';
  }

  function renderPage(data) {
    const el = document.getElementById('content');
    el.innerHTML =
      '<div class="case-header">' +
        '<div class="case-id">' + esc(data.case_id) + '</div>' +
        '<div class="case-title">' + esc(data.title) + '</div>' +
        '<div class="badges">' +
          severityBadge(data.severity) +
          statusBadge(data.status) +
          dispositionBadge(data.disposition) +
        '</div>' +
        '<div class="meta-line">Analyst: ' + esc(data.analyst || '-') +
          (data.created ? ' | Created: ' + relativeTime(data.created) : '') +
        '</div>' +
      '</div>' +

      '<div class="detail-grid">' +
        '<div class="panel">' +
          '<h2>IOCs</h2>' +
          renderIOCs(data.iocs) +
        '</div>' +

        '<div class="panel">' +
          '<h2>Verdicts</h2>' +
          renderVerdicts(data.verdicts) +
        '</div>' +

        '<div class="panel full-width">' +
          '<h2>Findings</h2>' +
          renderFindings(data.findings) +
        '</div>' +

        ((data.kql_queries && data.kql_queries.length) ?
          '<div class="panel full-width">' +
            '<h2>KQL Queries (' + data.kql_queries.length + ')</h2>' +
            renderKQLQueries(data.kql_queries) +
          '</div>' : '') +

        '<div class="panel full-width">' +
          '<h2>Investigation Log</h2>' +
          renderInvestigationLog(data.investigation_log) +
        '</div>' +

        (data.report_excerpt ?
          '<div class="panel full-width">' +
            '<h2>Report</h2>' +
            '<div class="report-content" id="reportContent"></div>' +
          '</div>' : '') +
      '</div>';

    if (data.report_excerpt) {
      try {
        document.getElementById('reportContent').innerHTML = marked.parse(data.report_excerpt);
      } catch {
        document.getElementById('reportContent').textContent = data.report_excerpt;
      }
    }
  }

  (async () => {
    const meResp = await apiFetch('/api/auth/me');
    if (meResp && meResp.ok) {
      const me = await meResp.json();
      document.getElementById('userEmail').textContent = me.email;
    }

    if (!caseId) return;

    const resp = await apiFetch('/api/investigations/' + encodeURIComponent(caseId) + '/context-summary');
    if (!resp || !resp.ok) {
      const err = resp ? await resp.text() : 'Connection error';
      document.getElementById('content').innerHTML = '<div class="loading">Failed to load case: ' + esc(err) + '</div>';
      return;
    }

    const data = await resp.json();
    renderPage(data);
  })();
</script>
</body>
</html>
