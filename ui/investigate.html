<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>socai — New Investigation</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; padding: 1.5rem; display: flex; flex-direction: column; min-height: 100vh; }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .topbar h1 { font-size: 1.3rem; }
  .topbar h1 span { color: #38bdf8; }
  .topbar nav a { color: #94a3b8; text-decoration: none; font-size: 0.9rem; }
  .topbar nav a:hover { color: #e2e8f0; }

  .main { display: flex; gap: 1.5rem; flex: 1; max-width: 1100px; width: 100%; }

  /* Left: input area */
  .input-area { flex: 1; display: flex; flex-direction: column; }
  .input-area h2 { font-size: 1rem; color: #94a3b8; margin-bottom: 0.5rem; }
  .chat-box {
    flex: 1; min-height: 200px; max-height: 60vh; padding: 0.75rem; border: 1px solid #334155;
    border-radius: 8px; background: #0f172a; color: #e2e8f0; font-size: 0.95rem;
    font-family: 'Consolas', 'Monaco', monospace; resize: vertical; line-height: 1.5;
  }
  .chat-box:focus { outline: none; border-color: #38bdf8; }
  .chat-box::placeholder { color: #475569; }

  .drop-zone {
    border: 2px dashed #334155; border-radius: 8px; padding: 0.75rem; text-align: center;
    color: #64748b; font-size: 0.85rem; margin-top: 0.75rem; cursor: pointer; transition: all 0.2s;
  }
  .drop-zone.dragover { border-color: #38bdf8; background: rgba(56,189,248,0.05); color: #38bdf8; }
  .drop-zone input[type="file"] { display: none; }
  .file-list { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
  .file-chip {
    background: #1e293b; padding: 0.3rem 0.6rem; border-radius: 4px; font-size: 0.8rem;
    display: flex; align-items: center; gap: 0.4rem;
  }
  .file-chip .remove { cursor: pointer; color: #f87171; font-weight: bold; }

  .controls { display: flex; gap: 0.75rem; margin-top: 0.75rem; align-items: center; flex-wrap: wrap; }
  .controls select, .controls input[type="password"] {
    padding: 0.45rem 0.6rem; border: 1px solid #334155; border-radius: 6px;
    background: #0f172a; color: #e2e8f0; font-size: 0.85rem;
  }
  .controls label { display: flex; align-items: center; gap: 0.3rem; font-size: 0.85rem; color: #94a3b8; cursor: pointer; }
  .controls input[type="checkbox"] { accent-color: #2563eb; }
  button.submit {
    padding: 0.6rem 1.5rem; border: none; border-radius: 6px; background: #2563eb;
    color: #fff; font-size: 0.95rem; cursor: pointer; margin-left: auto;
  }
  button.submit:hover { background: #1d4ed8; }
  button.submit:disabled { background: #334155; cursor: not-allowed; }

  /* Right: live preview */
  .preview { width: 320px; flex-shrink: 0; }
  .preview-card {
    background: #1e293b; border-radius: 10px; padding: 1rem; position: sticky; top: 1.5rem;
  }
  .preview-card h3 { font-size: 0.9rem; color: #64748b; margin-bottom: 0.75rem; }
  .ioc-group { margin-bottom: 0.75rem; }
  .ioc-group .label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem; }
  .ioc-group .items { font-size: 0.85rem; font-family: 'Consolas', monospace; }
  .ioc-group .items div { padding: 0.15rem 0; word-break: break-all; }
  .ioc-group .items .url { color: #38bdf8; }
  .ioc-group .items .hash { color: #a78bfa; }
  .ioc-group .items .ip { color: #fb923c; }
  .ioc-group .items .email { color: #34d399; }
  .ioc-group .items .cve { color: #f87171; }
  .sev-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: 600; }
  .sev-critical { background: #dc3545; color: #fff; }
  .sev-high { background: #fd7e14; color: #fff; }
  .sev-medium { background: #ffc107; color: #000; }
  .sev-low { background: #198754; color: #fff; }
  .preview-title { font-size: 0.85rem; color: #e2e8f0; margin-bottom: 0.5rem; font-style: italic; }
  .preview-empty { color: #475569; font-size: 0.85rem; font-style: italic; }

  .error { color: #f87171; font-size: 0.85rem; margin-top: 0.5rem; display: none; }
</style>
</head>
<body>
<div class="topbar">
  <h1><span>soc</span>ai</h1>
  <nav style="display:flex;gap:0.75rem;align-items:center;">
    <a href="/ui/dashboard.html" style="color:#94a3b8;text-decoration:none;font-size:0.85rem;border:1px solid #334155;padding:0.3rem 0.7rem;border-radius:6px;">Dashboard</a>
    <a href="/ui/cases.html" style="color:#94a3b8;text-decoration:none;font-size:0.85rem;border:1px solid #334155;padding:0.3rem 0.7rem;border-radius:6px;">Cases</a>
    <a href="/ui/case.html" style="color:#94a3b8;text-decoration:none;font-size:0.85rem;border:1px solid #334155;padding:0.3rem 0.7rem;border-radius:6px;">Chat</a>
  </nav>
</div>

<div class="main">
  <div class="input-area">
    <h2>Paste anything — URLs, hashes, IPs, context. We'll figure it out.</h2>
    <textarea class="chat-box" id="input" placeholder="Paste your investigation data here...

Examples:
  User received phishing email linking to hxxps://login-microsoft[.]xyz/auth
  Severity: high

  https://suspicious-site.com/payload.exe
  SHA256: a1b2c3d4e5f6...

  Suspicious IP 45.33.32.156 seen in firewall logs
  connecting to evil-domain.com on port 443"></textarea>

    <div class="drop-zone" id="dropZone">
      Drop files here or click to upload (ZIP, EML)
      <input type="file" id="fileInput" multiple accept=".zip,.eml,.msg,.exe,.dll,.pdf">
    </div>
    <div class="file-list" id="fileList"></div>

    <div class="controls">
      <select id="severity" title="Override auto-detected severity">
        <option value="">Auto severity</option>
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
        <option value="critical">Critical</option>
      </select>
      <input type="password" id="zipPass" placeholder="ZIP password" style="width:120px;" title="Password for encrypted ZIP files">
      <label><input type="checkbox" id="detonate"> Detonate</label>
      <label><input type="checkbox" id="includePrivate"> Private IPs</label>
      <button class="submit" id="submitBtn">Investigate</button>
    </div>
    <div class="error" id="error"></div>
  </div>

  <div class="preview">
    <div class="preview-card">
      <h3>Detected IOCs</h3>
      <div id="previewContent"><div class="preview-empty">Start typing to see extracted IOCs...</div></div>
    </div>
  </div>
</div>

<script src="/ui/app.js"></script>
<script>
  requireAuth();

  const inputEl = document.getElementById('input');
  const previewEl = document.getElementById('previewContent');
  const fileInput = document.getElementById('fileInput');
  const dropZone = document.getElementById('dropZone');
  const fileListEl = document.getElementById('fileList');
  let uploadedFiles = [];
  let parseTimer = null;

  // --- Live parse preview ---
  inputEl.addEventListener('input', () => {
    clearTimeout(parseTimer);
    parseTimer = setTimeout(parsePreview, 400);
  });

  async function parsePreview() {
    const text = inputEl.value.trim();
    if (!text) {
      previewEl.innerHTML = '<div class="preview-empty">Start typing to see extracted IOCs...</div>';
      return;
    }
    const fd = new FormData();
    fd.append('text', text);
    const token = getToken();
    try {
      const resp = await fetch('/api/parse', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token },
        body: fd,
      });
      if (!resp.ok) return;
      const data = await resp.json();
      renderPreview(data);
    } catch(e) {}
  }

  function renderPreview(data) {
    let html = '';
    if (data.title) {
      html += '<div class="preview-title">"' + esc(data.title) + '"</div>';
    }
    if (data.severity) {
      html += '<span class="sev-badge sev-' + data.severity + '">' + data.severity + '</span><br><br>';
    }
    function group(label, items, cls) {
      if (!items || items.length === 0) return '';
      let h = '<div class="ioc-group"><div class="label">' + label + ' (' + items.length + ')</div><div class="items">';
      items.forEach(v => { h += '<div class="' + cls + '">' + esc(v) + '</div>'; });
      return h + '</div></div>';
    }
    html += group('URLs', data.urls, 'url');
    html += group('IPs', data.ips, 'ip');
    html += group('Hashes', data.hashes, 'hash');
    html += group('Emails', data.emails, 'email');
    html += group('CVEs', data.cves, 'cve');

    if (!html) html = '<div class="preview-empty">No IOCs detected yet...</div>';
    previewEl.innerHTML = html;
  }

  // --- File handling ---
  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    addFiles(e.dataTransfer.files);
  });
  fileInput.addEventListener('change', () => { addFiles(fileInput.files); fileInput.value = ''; });

  function addFiles(files) {
    for (const f of files) {
      if (!uploadedFiles.some(u => u.name === f.name && u.size === f.size)) {
        uploadedFiles.push(f);
      }
    }
    renderFiles();
  }

  function removeFile(idx) {
    uploadedFiles.splice(idx, 1);
    renderFiles();
  }

  function renderFiles() {
    fileListEl.innerHTML = uploadedFiles.map((f, i) =>
      '<div class="file-chip">' + esc(f.name) + ' <span class="remove" onclick="removeFile(' + i + ')">x</span></div>'
    ).join('');
  }

  // --- Submit ---
  document.getElementById('submitBtn').addEventListener('click', async () => {
    const errEl = document.getElementById('error');
    const btn = document.getElementById('submitBtn');
    errEl.style.display = 'none';

    const text = inputEl.value.trim();
    if (!text && uploadedFiles.length === 0) {
      errEl.textContent = 'Paste some IOCs or upload files to investigate';
      errEl.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Submitting...';

    const fd = new FormData();
    fd.append('text', text);
    fd.append('severity', document.getElementById('severity').value);
    fd.append('zip_pass', document.getElementById('zipPass').value);
    fd.append('detonate', document.getElementById('detonate').checked);
    fd.append('include_private_ips', document.getElementById('includePrivate').checked);

    // Attach files by type
    for (const f of uploadedFiles) {
      if (f.name.endsWith('.eml') || f.name.endsWith('.msg')) {
        fd.append('eml_files', f);
      } else {
        fd.append('zip_file', f);
      }
    }

    try {
      const token = getToken();
      const resp = await fetch('/api/cases', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token },
        body: fd,
      });
      if (resp.status === 401) { clearToken(); window.location.href = '/ui/index.html'; return; }
      if (!resp.ok) {
        const data = await resp.json().catch(() => ({}));
        errEl.textContent = data.detail || 'Submission failed';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Investigate';
        return;
      }
      const data = await resp.json();
      window.location.href = '/ui/case.html?case=' + data.case_id;
    } catch (err) {
      errEl.textContent = 'Connection error';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Investigate';
    }
  });

  // Ctrl+Enter to submit
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      document.getElementById('submitBtn').click();
    }
  });
</script>
</body>
</html>
