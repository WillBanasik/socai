<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>socai — Cases</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; padding: 1.5rem; }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
  .topbar h1 { font-size: 1.3rem; }
  .topbar h1 span { color: #38bdf8; }
  .topbar nav { display: flex; gap: 0.75rem; align-items: center; }
  .topbar nav a, .topbar nav button { background: none; border: 1px solid #334155; color: #94a3b8; padding: 0.4rem 0.8rem; border-radius: 6px; cursor: pointer; text-decoration: none; font-size: 0.85rem; }
  .topbar nav a:hover, .topbar nav button:hover { color: #e2e8f0; border-color: #64748b; }
  .topbar nav a.active { color: #38bdf8; border-color: #38bdf8; }
  .btn-primary { background: #2563eb !important; color: #fff !important; border-color: #2563eb !important; }
  .btn-primary:hover { background: #1d4ed8 !important; }

  /* Filter bar */
  .filter-bar {
    display: flex; gap: 0.5rem; margin-bottom: 1.25rem; flex-wrap: wrap; align-items: center;
  }
  .filter-bar select, .filter-bar input {
    background: #1e293b; color: #e2e8f0; border: 1px solid #334155; border-radius: 6px;
    padding: 0.4rem 0.6rem; font-size: 0.85rem; font-family: inherit;
  }
  .filter-bar select:focus, .filter-bar input:focus { outline: none; border-color: #38bdf8; }
  .filter-bar input { flex: 1; min-width: 180px; }
  .filter-count { font-size: 0.8rem; color: #64748b; margin-left: auto; }

  /* Case cards grid */
  .cases-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 0.75rem;
  }
  .case-card {
    background: #1e293b; border-radius: 10px; padding: 1rem; cursor: pointer;
    border: 1px solid #334155; transition: border-color 0.15s, transform 0.1s;
  }
  .case-card:hover { border-color: #38bdf8; transform: translateY(-1px); }
  .case-card .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem; }
  .case-card .card-id { font-size: 0.8rem; color: #38bdf8; font-weight: 600; }
  .case-card .card-date { font-size: 0.72rem; color: #64748b; }
  .case-card .card-title { font-size: 0.92rem; font-weight: 600; margin-bottom: 0.5rem; line-height: 1.3; color: #f1f5f9; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .case-card .card-badges { display: flex; gap: 0.35rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
  .case-card .card-meta { display: flex; gap: 1rem; font-size: 0.75rem; color: #94a3b8; }
  .case-card .card-meta .meta-item { display: flex; align-items: center; gap: 0.25rem; }
  .case-card .card-refs { font-size: 0.7rem; color: #64748b; margin-top: 0.35rem; }

  .empty-state { text-align: center; color: #64748b; padding: 3rem; font-size: 0.95rem; }

  /* Stat cards */
  .stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; margin-bottom: 1.25rem; }
  @media (max-width: 768px) { .stat-row { grid-template-columns: repeat(2, 1fr); } }
  .stat-card { background: #1e293b; border-radius: 10px; padding: 1rem 1.25rem; border: 1px solid #334155; }
  .stat-card .stat-label { font-size: 0.75rem; color: #64748b; margin-bottom: 0.25rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-card .stat-value { font-size: 1.8rem; font-weight: 700; color: #f1f5f9; }
  .stat-card .stat-sub { font-size: 0.72rem; color: #94a3b8; margin-top: 0.15rem; }

  /* Chart row */
  .chart-row { display: grid; grid-template-columns: 1fr 2fr; gap: 0.75rem; margin-bottom: 1.25rem; }
  @media (max-width: 768px) { .chart-row { grid-template-columns: 1fr; } }
  .chart-panel { background: #1e293b; border-radius: 10px; padding: 1.25rem; border: 1px solid #334155; }
  .chart-panel h2 { font-size: 0.95rem; margin-bottom: 0.75rem; color: #94a3b8; }
  .chart-container { position: relative; max-height: 280px; }
</style>
</head>
<body>
<div class="topbar">
  <h1><span>soc</span>ai — Cases</h1>
  <nav>
    <a href="/ui/dashboard.html">Dashboard</a>
    <a href="/ui/cases.html" class="active">Cases</a>
    <a href="/ui/case.html" class="btn-primary">Chat</a>
    <span id="userEmail" style="color:#64748b;font-size:0.85rem;"></span>
    <button onclick="logout()">Logout</button>
  </nav>
</div>

<!-- Case Overview -->
<div class="stat-row">
  <div class="stat-card">
    <div class="stat-label">Total Cases</div>
    <div class="stat-value" id="statTotal">-</div>
    <div class="stat-sub" id="statTotalSub"></div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Open High/Critical</div>
    <div class="stat-value" id="statHighCrit" style="color:#f87171;">-</div>
    <div class="stat-sub" id="statHighCritSub"></div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Malicious IOCs</div>
    <div class="stat-value" id="statMalIOCs" style="color:#fb923c;">-</div>
    <div class="stat-sub" id="statMalIOCsSub"></div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Active Clusters</div>
    <div class="stat-value" id="statClusters" style="color:#38bdf8;">-</div>
    <div class="stat-sub" id="statClustersSub"></div>
  </div>
</div>

<div class="chart-row">
  <div class="chart-panel">
    <h2>Severity Breakdown</h2>
    <div class="chart-container"><canvas id="severityChart"></canvas></div>
  </div>
  <div class="chart-panel">
    <h2>Cases Over Time</h2>
    <div class="chart-container"><canvas id="timeChart"></canvas></div>
  </div>
</div>

<div class="filter-bar">
  <select id="filterSeverity">
    <option value="">All severities</option>
    <option value="critical">Critical</option>
    <option value="high">High</option>
    <option value="medium">Medium</option>
    <option value="low">Low</option>
  </select>
  <select id="filterStatus">
    <option value="">All statuses</option>
    <option value="open">Open</option>
    <option value="closed">Closed</option>
  </select>
  <select id="filterDisposition">
    <option value="">All dispositions</option>
    <option value="malicious">Malicious</option>
    <option value="true_positive">True Positive</option>
    <option value="suspicious">Suspicious</option>
    <option value="false_positive">False Positive</option>
    <option value="benign">Benign</option>
    <option value="undetermined">Undetermined</option>
  </select>
  <input type="text" id="filterSearch" placeholder="Search by title or case ID...">
  <span class="filter-count" id="filterCount"></span>
</div>

<div class="cases-grid" id="casesGrid">
  <div class="empty-state">Loading cases...</div>
</div>

<script src="/ui/app.js?v=2"></script>
<script>
  requireAuth();

  let allCases = [];
  let severityChartInstance = null;
  let timeChartInstance = null;

  function renderCaseOverview(data) {
    const stats = data.case_stats || {};
    const iocIntel = data.ioc_intelligence || {};
    const links = data.link_analysis || {};

    // Stat cards
    document.getElementById('statTotal').textContent = stats.total_cases || 0;
    const openCount = (stats.by_status || {}).open || 0;
    const closedCount = (stats.by_status || {}).closed || 0;
    document.getElementById('statTotalSub').textContent = openCount + ' open, ' + closedCount + ' closed';

    const bySev = stats.by_severity || {};
    const highCrit = (bySev.high || 0) + (bySev.critical || 0);
    document.getElementById('statHighCrit').textContent = highCrit;
    document.getElementById('statHighCritSub').textContent = (bySev.critical || 0) + ' critical, ' + (bySev.high || 0) + ' high';

    const highRisk = iocIntel.high_risk_cross_case || [];
    document.getElementById('statMalIOCs').textContent = highRisk.length;
    document.getElementById('statMalIOCsSub').textContent = 'across multiple cases';

    const clusters = links.clusters || [];
    document.getElementById('statClusters').textContent = clusters.length;
    document.getElementById('statClustersSub').textContent = 'linked case groups';

    // Severity donut
    const sevLabels = ['critical', 'high', 'medium', 'low'];
    const sevData = sevLabels.map(s => bySev[s] || 0);
    const sevColors = ['#dc3545', '#fd7e14', '#ffc107', '#198754'];
    const ctx1 = document.getElementById('severityChart').getContext('2d');
    if (severityChartInstance) severityChartInstance.destroy();
    severityChartInstance = new Chart(ctx1, {
      type: 'doughnut',
      data: { labels: sevLabels, datasets: [{ data: sevData, backgroundColor: sevColors, borderWidth: 0 }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', font: { size: 11 } } } },
      },
    });

    // Cases over time bar chart
    const byDate = stats.by_date || {};
    const dateLabels = Object.keys(byDate).sort().slice(-14);
    const dateData = dateLabels.map(d => byDate[d] || 0);
    const ctx2 = document.getElementById('timeChart').getContext('2d');
    if (timeChartInstance) timeChartInstance.destroy();
    timeChartInstance = new Chart(ctx2, {
      type: 'bar',
      data: {
        labels: dateLabels,
        datasets: [{ label: 'Cases', data: dateData, backgroundColor: '#3b82f6', borderRadius: 3 }],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: {
          x: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { display: false } },
          y: { beginAtZero: true, ticks: { color: '#64748b', stepSize: 1 }, grid: { color: '#1e293b' } },
        },
        plugins: { legend: { display: false } },
      },
    });
  }

  function overviewFromBrowse(cases) {
    const stats = { total_cases: cases.length, by_severity: {}, by_status: {}, by_date: {} };
    cases.forEach(c => {
      stats.by_severity[c.severity] = (stats.by_severity[c.severity] || 0) + 1;
      stats.by_status[c.status] = (stats.by_status[c.status] || 0) + 1;
      if (c.created) {
        const d = c.created.slice(0, 10);
        stats.by_date[d] = (stats.by_date[d] || 0) + 1;
      }
    });
    return { case_stats: stats };
  }

  function iocSummary(totals) {
    if (!totals || !Object.keys(totals).length) return '';
    return Object.entries(totals).map(([k, v]) => v + ' ' + k).join(', ');
  }

  function renderCases(cases) {
    const grid = document.getElementById('casesGrid');
    document.getElementById('filterCount').textContent = cases.length + ' case' + (cases.length !== 1 ? 's' : '');

    if (!cases.length) {
      grid.innerHTML = '<div class="empty-state">No cases match filters.</div>';
      return;
    }

    grid.innerHTML = cases.map(c => {
      const iocStr = iocSummary(c.ioc_totals);
      const refs = c.external_refs || {};
      const refStr = Object.entries(refs).map(([k, v]) => esc(k) + ': ' + esc(v)).join(' | ');

      return '<div class="case-card" data-case="' + esc(c.case_id) + '">' +
        '<div class="card-header">' +
          '<span class="card-id">' + esc(c.case_id) + '</span>' +
          '<span class="card-date">' + relativeTime(c.created) + '</span>' +
        '</div>' +
        '<div class="card-title">' + esc(c.title) + '</div>' +
        '<div class="card-badges">' +
          severityBadge(c.severity) +
          statusBadge(c.status) +
          dispositionBadge(c.disposition) +
        '</div>' +
        '<div class="card-meta">' +
          (iocStr ? '<span class="meta-item" title="IOCs">' + esc(iocStr) + '</span>' : '') +
          (c.link_count ? '<span class="meta-item" title="Linked cases">' + c.link_count + ' link' + (c.link_count > 1 ? 's' : '') + '</span>' : '') +
        '</div>' +
        (refStr ? '<div class="card-refs">' + refStr + '</div>' : '') +
      '</div>';
    }).join('');

    // Event delegation for card clicks
    grid.querySelectorAll('.case-card').forEach(card => {
      card.onclick = () => window.location.href = '/ui/case-detail.html?case=' + encodeURIComponent(card.dataset.case);
    });
  }

  function applyFilters() {
    const sev = document.getElementById('filterSeverity').value;
    const stat = document.getElementById('filterStatus').value;
    const disp = document.getElementById('filterDisposition').value;
    const q = document.getElementById('filterSearch').value.toLowerCase().trim();

    const filtered = allCases.filter(c => {
      if (sev && c.severity !== sev) return false;
      if (stat && c.status !== stat) return false;
      if (disp && c.disposition !== disp) return false;
      if (q && !c.title.toLowerCase().includes(q) && !c.case_id.toLowerCase().includes(q)) return false;
      return true;
    });
    renderCases(filtered);
  }

  document.getElementById('filterSeverity').onchange = applyFilters;
  document.getElementById('filterStatus').onchange = applyFilters;
  document.getElementById('filterDisposition').onchange = applyFilters;
  document.getElementById('filterSearch').oninput = applyFilters;

  (async () => {
    const [meResp, browseResp, landscapeResp] = await Promise.all([
      apiFetch('/api/auth/me'),
      apiFetch('/api/investigations/browse'),
      apiFetch('/api/landscape'),
    ]);

    if (meResp && meResp.ok) {
      const me = await meResp.json();
      document.getElementById('userEmail').textContent = me.email;
    }

    if (!browseResp || !browseResp.ok) {
      document.getElementById('casesGrid').innerHTML = '<div class="empty-state">Failed to load cases.</div>';
      return;
    }
    allCases = await browseResp.json();
    renderCases(allCases);

    // Render overview from landscape data, falling back to browse data
    if (landscapeResp && landscapeResp.ok) {
      const landscape = await landscapeResp.json();
      renderCaseOverview(landscape);
    } else {
      renderCaseOverview(overviewFromBrowse(allCases));
    }
  })();
</script>
</body>
</html>
