id: credential-access
name: Credential Access / AD Attacks Investigation
description: >
  Targets credential-theft TTPs directly (distinct from lateral-movement, which only
  side-checks them on a movement path): LSASS access / dumping, Kerberoasting and
  AS-REP roasting, DCSync / directory replication abuse, and correlated credential-
  theft detections. Stage 1 (LSASS) and Stage 4 (detections) always run; Stages 2-3
  are conditional. Reuses the Kerberoasting RC4 pattern from the team's reference
  query set.
required_capabilities:
  sentinel:
  - device_process_events
  - identity_logon
  - security_alerts
  - windows_security_events
  logscale:
  - device_process_events
  - security_alerts
  - windows_security_events
parameters:
- name: device_name
  type: string
  description: Host to scope endpoint stages (regex/substring matched). __NONE__ to scan all.
  default: __NONE__
- name: target_account
  type: string
  description: Account under investigation (optional; __NONE__ to scan all).
  default: __NONE__
- name: dc_name
  type: string
  description: Domain controller name for DCSync scoping (optional).
  default: __NONE__
- name: lookback
  type: string
  description: Time range to investigate (default 7d).
  default: 7d
stages:
- id: 1
  name: LSASS access / credential dumping
  description: dumping tooling and behaviour targeting lsass (procdump, comsvcs, mimikatz).
  run: "ALWAYS — primary endpoint credential-theft signal."
  query_file: 1_lsass_access
- id: 2
  name: Kerberoasting / AS-REP roasting
  description: RC4/DES TGS requests (4769) and pre-auth-disabled accounts (4768).
  run: when AD credential-theft is suspected.
  query_file: 2_kerberoast_asrep
- id: 3
  name: DCSync / directory replication abuse
  description: replication control-access rights (4662) requested by a non-DC account.
  run: when domain-level credential theft is suspected.
  query_file: 3_dcsync
- id: 4
  name: Credential-theft detections
  description: correlated EDR/SIEM credential-access alerts.
  run: "ALWAYS — surfaces vendor detections for the above TTPs."
  query_file: 4_credential_detections
definitions:
- term: DCSync
  definition: >
    MITRE T1003.006 — abusing the directory replication protocol (DRSUAPI) to pull
    password hashes from a DC. Legitimate replication is between DCs; a request from a
    non-DC account is the tell.
