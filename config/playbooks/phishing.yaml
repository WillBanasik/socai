id: phishing
name: Phishing Investigation
description: Multi-stage phishing campaign investigation. Scope broad, then narrow. *** START
  BROAD *** An alert names one NetworkMessageId, but a phishing campaign typically delivers
  the same payload to many recipients sharing the same sender + subject. Stage 0 expands the
  seed alert into the full set of related NetworkMessageIds BEFORE any narrow-scope analysis
  runs. Stage 1 onwards operates on the expanded ID set, not on the alert's single message.
  Skipping Stage 0 under-counts recipients, misses clickers, and leaves the attacker's other
  deliveries unaccounted for. Stage 0 expands the alert seed to the full campaign by (sender,
  subject). Stage 1 gathers full email evidence summarised by recipient UPN across the expanded
  NetworkMessageId set. Stages 2-4 are conditional follow-ups based on Stage 1 results.
required_capabilities:
  sentinel:
  - device_file_events
  - device_process_events
  - email_events
  - email_post_delivery
  - email_url_clicks
  - identity_logon
  logscale:
  - device_file_events
  - device_process_events
  - email_events
  - email_post_delivery
  - email_url_clicks
  - identity_logon
parameters:
- name: seed_message_id
  type: string
  description: Single NetworkMessageId from the alert (used by Stage 0 to derive sender/subject)
- name: target_ids
  type: string
  description: Comma-separated NetworkMessageIds. Populated from Stage 0 output before Stage
    1.
- name: sender
  type: string
  description: Malicious sender email address (auto-derived in Stage 0 if seed_message_id
    supplied)
- name: subject
  type: string
  description: Email subject for broad-scope expansion (auto-derived in Stage 0 if seed_message_id
    supplied)
- name: url
  type: string
  description: Malicious URL (used in stage 3; extracted from stage 1)
- name: sha256
  type: string
  description: Attachment SHA256 hash (used in stage 4; extracted from stage 1)
- name: lookback
  type: string
  description: Time range for broad-scope expansion (default 14d)
  default: 14d
stages:
- id: 0
  name: Broad scope expansion (sender + subject)
  description: See query block.
  run: "ALWAYS \u2014 first step. Expand the alert seed into the full campaign set."
  query_file: 0_broad_scope_expansion_sender_subject
- id: 1
  name: Core email evidence (per UPN)
  description: See query block.
  run: "ALWAYS \u2014 after Stage 0 expansion. Do NOT pass only the alert's single"
  query_file: 1_core_email_evidence_per_upn
- id: 2
  name: Post-delivery logon correlation
  description: detect whether any recipient logged on to a device within 30 minutes
  run: when Stage 1 shows DeliveryAction == "Delivered" AND ThreatTypes present.
  query_file: 2_post_delivery_logon_correlation
- id: 3
  name: URL delivery scope and exposure time
  description: find all recipients who received this URL, check delivery status,
  run: when Stage 1 returns URLs.
  query_file: 3_url_delivery_scope_and_exposure_time
- id: 4
  name: Attachment endpoint execution
  description: confirm whether the attachment was written to disk and/or executed
  run: when Stage 1 returns attachment hashes.
  query_file: 4_attachment_endpoint_execution
definitions:
- term: Broad Scope Principle
  definition: '>'
