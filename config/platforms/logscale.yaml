# CrowdStrike Falcon NG-SIEM (LogScale / Humio) platform adapter.
#
# LogScale is the same query language CrowdStrike NG-SIEM uses (Humio acquired).
# Capabilities depend on which connectors a client has configured; the set
# below is the *maximum* this adapter supports. A specific client may have a
# subset — when that matters we'll move client-specific capabilities into the
# client_entities config.

id: logscale
name: CrowdStrike Falcon NG-SIEM (LogScale)
description: >
  CrowdStrike Falcon NG-SIEM (built on Humio/LogScale). CQL queries with
  @dataConnectionID tagging to filter by connector. Native source for Falcon
  endpoint, identity, and logon events; cloud / email events require a
  forwarding connector.

query_language: cql

schema_ref: logscale

# Capability names are deliberately vendor-neutral so the same name on
# Sentinel and LogScale signals equivalent data. Each platform declares
# the names it can satisfy via whichever connector / sensor it has.
capabilities:
  - device_process_events      # Falcon ProcessRollup → equivalent to Sentinel DeviceProcessEvents
  - device_file_events         # Falcon FileWritten / FileOpened
  - device_network_events      # Falcon NetworkConnect
  - identity_logon             # Falcon UserLogon (and on-prem if Windows connector forwards)
  - windows_security_events    # Windows Event Log (4624/4625/4769 etc.) via Windows connector
  - sign_in_events             # dedicated entraid connector; dataset entraid.signin (NOT azure.signinlogs / NOT via M365)
  # The following ride the Microsoft 365 / Defender forwarding connectors. They
  # are the *maximum* this adapter supports — a client only satisfies them when
  # the relevant connector is configured. The vendor+module tags below are
  # verified against onboarded clients (see config/ngsiem/ngsiem_rules.md §4 and
  # config/ngsiem/ngsiem_columns.yaml). Email/attachment/URL/click/post-delivery
  # data arrives via the Defender advanced-hunting stream
  # (#event.module=windows-defender-365); inbox-rule / mailbox / OAuth audit and
  # SharePoint/OneDrive activity via the M365 unified audit log
  # (#event.module=m365). Clients without the connector simply return no rows —
  # the same behaviour as Sentinel when the corresponding table is not ingested.
  - email_events               # Defender AdvancedHunting EmailEvents (windows-defender-365)
  - email_url_clicks           # Defender AdvancedHunting UrlClickEvents (windows-defender-365)
  - email_post_delivery        # Defender AdvancedHunting EmailPostDeliveryEvents (windows-defender-365)
  - office_activity            # M365 unified audit log: inbox rules, mailbox ops, SharePoint/OneDrive (m365)
  - cloud_app_events           # M365 / Defender for Cloud Apps activity (m365 audit; MDA where forwarded)
  - service_principal_signins  # Entra service-principal sign-ins (entraid connector)
  - security_alerts            # Defender / Falcon detections (windows-defender-365 AlertInfo; DetectionSummaryEvent)

template_syntax:
  parameter_pattern: "{{name}}"
  list_format: comma_quoted

query_dir: logscale
query_file_ext: cql

# LogScale doesn't have a direct execution API in SOCAI yet. Render-only mode:
# the loader returns the rendered query for the analyst to run manually in the
# LogScale UI. When a CQL execution path is added (e.g. via the Falcon API),
# replace this with mode: api + module/function pointing at the executor.
executor:
  mode: render_only
