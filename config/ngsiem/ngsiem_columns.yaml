# =============================================================================
# NGSIEM Field Schema — per connector/data source
# =============================================================================
#
# Maintained manually by engineers. Use the discovery queries below to populate.
#
# DISCOVERY QUERIES:
#
#   1. List all connectors:
#      *
#      | groupBy(@dataConnectionID, function=[
#          collect([#Vendor, #event.dataset, #event.module, observer.vendor, observer.product]),
#          count()
#        ])
#
#   2. Get sample event for a connector (to see all field names):
#      @dataConnectionID = "CONNECTOR_ID_HERE"
#      | tail(1)
#
#   3. Get all non-null field names for a connector:
#      @dataConnectionID = "CONNECTOR_ID_HERE"
#      | tail(100)
#      | rename(@rawstring, as=_raw)
#      | drop(_raw)
#
# HOW TO ADD A NEW CONNECTOR:
#   1. Run query 1 to find the @dataConnectionID
#   2. Run query 2 to get a sample event
#   3. Copy the field names into a new entry below
#   4. Fill in vendor, product, description, and filter
#
# STRUCTURE:
#   Each connector entry has:
#     vendor:       Vendor name (for human reference)
#     product:      Product or log type name
#     description:  What this data source provides
#     filter:       CQL filter to scope queries to this data source
#     tags:         Tag-level filters (# prefixed, applied before pipeline)
#     fields:       List of field names present in this data source
#                   Split into common (ECS/standard) and vendor-specific

# =============================================================================
# Common fields — present across most/all connectors
# =============================================================================
common:
  description: "Fields present in most events regardless of data source"
  meta_fields:
  - "@id"
  - "@timestamp"
  - "@ingesttimestamp"
  - "@rawstring"
  - "@timezone"
  - "@timestamp.nanos"
  - "@dataConnectionID"
  - "@error"
  - "@error_msg"
  - "@source"
  - "@sourcetype"
  collection_fields:
  - "@collect.channel"
  - "@collect.file"
  - "@collect.host"
  - "@collect.id"
  - "@collect.remote"
  - "@collect.socket"
  - "@collect.source_name"
  - "@collect.source_type"
  - "@collect.timestamp"
  - "@collect.timezone"
  tag_fields:
  - "#Vendor"
  - "#ecs.version"
  - "#event.dataset"
  - "#event.kind"
  - "#event.module"
  - "#event.outcome"
  - "#observer.type"
  - "#repo"
  - "#repo.cid"
  - "#type"
  - "#humioAutoShard"
  enrichment_fields:
  - "Ngsiem.enrichments.fields[0]"
  - "Ngsiem.enrichments.fields[1]"
  - "Parser.version"

