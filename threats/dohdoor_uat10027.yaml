metadata:
  threat_actor: UAT-10027
  malware_family: Dohdoor
  attribution: North Korea (DPRK)
  targets:
    - US technology sector
    - US education sector
    - US healthcare sector
  first_reported: 2026-02-27
  source: Cisco Talos
  source_url: https://blog.talosintelligence.com/new-north-korean-threat-actor-engaging-in/
  ioc_source: https://github.com/Cisco-Talos/IOCs/blob/main/2025/02/new-north-korean-threat-actor.txt
  ttps:
    - T1574.002  # DLL Side-Loading
    - T1071.004  # Application Layer Protocol: DNS (DoH)
    - T1568      # Dynamic Resolution
    - T1027      # Obfuscated Files or Information
    - T1059.003  # Command and Scripting Interpreter: Windows Command Shell
    - T1036.005  # Masquerading: Match Legitimate Name or Location
  description: |-
    UAT-10027 is a North Korean threat actor discovered by Cisco Talos in February 2026.
    They deploy the "Dohdoor" backdoor via DLL sideloading through legitimate Windows
    executables. The backdoor uses DNS-over-HTTPS (DoH) via Cloudflare (1.1.1.1) for
    C2 communication, making detection via traditional DNS monitoring ineffective.
    Initial access is achieved through phishing emails with malicious URLs leading to
    archive downloads containing the sideloading payload.

