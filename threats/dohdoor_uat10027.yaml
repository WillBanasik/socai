queries:
- platform: kql
  category: hash_sha256
  table: DeviceFileEvents
  description: Dohdoor backdoor file hash presence
  query: |-
    let dohdoor_hashes = dynamic([
        "54e18978c6405f56cd59ba55a62291436639f21cf325ae509f0599b15e8f7f53",
        "0bb130b1fafb17705d31fe5dd25e7b2d62176578609d75cc57911ef5582ef17a",
        "54545fa3a2d8da6746021812ebaa9d26f33bba4f63c6f7f35caa6fa4ee8c0e6a",
        "8e97c677aec905152f8a92fed50bb84ef2e8985d5c29330c5a05a4a2afcbd4a5",
        "800faaf15d5f42f2ab2c1d2b6b65c8a9e4def6dc10f6ce4e269dcf23f4e8dae2",
        "b1bd8f7d4488977cca03954a57f5c8ad7bfd4609bcc3bae92326830fcbd3232c",
        "2ce3e75997f89b98dd280d164a5f21f7565f4de26eed61243badde04b480700e"
    ]);
    DeviceFileEvents
    | where SHA256 in (dohdoor_hashes)
    | project TimeGenerated, DeviceName, FileName, FolderPath, SHA256, ActionType,
             InitiatingProcessFileName, InitiatingProcessCommandLine
    | order by TimeGenerated asc

- platform: kql
  category: domain
  table: DeviceNetworkEvents
  description: Dohdoor C2 domain communication
  query: |-
    DeviceNetworkEvents
    | where RemoteUrl has "mswinsoftupload.design"
        or RemoteUrl has "deepinspectionsystem.online"
        or RemoteUrl has "pnuisckmhwagzvdyjrlbeft.software"
    | project TimeGenerated, DeviceName, RemoteUrl, RemoteIP, RemotePort,
             InitiatingProcessFileName, InitiatingProcessCommandLine, ActionType
    | order by TimeGenerated asc

- platform: kql
  category: sideloading
  table: DeviceImageLoadEvents
  description: DLL sideloading — malicious DLL loaded by legitimate host
  query: |-
    let sideload_dlls = dynamic(["propsys.dll", "batmeter.dll"]);
    let sideload_hosts = dynamic([
        "Fondue.exe", "mblctr.exe", "ScreenClippingHost.exe",
        "OpenWith.exe", "wksprt.exe", "ImagingDevices.exe", "wab.exe"
    ]);
    DeviceImageLoadEvents
    | where FileName in~ (sideload_dlls)
        and InitiatingProcessFileName in~ (sideload_hosts)
    | project TimeGenerated, DeviceName, FileName, FolderPath, SHA256,
             InitiatingProcessFileName, InitiatingProcessFolderPath
    | order by TimeGenerated asc

- platform: kql
  category: sideloading
  table: DeviceProcessEvents
  description: Sideloading host executables running outside System32
  query: |-
    let sideload_hosts = dynamic([
        "Fondue.exe", "mblctr.exe", "ScreenClippingHost.exe",
        "OpenWith.exe", "wksprt.exe", "ImagingDevices.exe", "wab.exe"
    ]);
    DeviceProcessEvents
    | where FileName in~ (sideload_hosts)
        and not(FolderPath startswith "C:\\Windows\\System32")
        and not(FolderPath startswith "C:\\Windows\\SysWOW64")
    | project TimeGenerated, DeviceName, AccountName, FileName, FolderPath,
             ProcessCommandLine, SHA256, InitiatingProcessFileName
    | order by TimeGenerated asc

- platform: kql
  category: doh
  table: DeviceNetworkEvents
  description: DNS-over-HTTPS to Cloudflare — Dohdoor C2 channel
  query: |-
    DeviceNetworkEvents
    | where RemoteIP in ("1.1.1.1", "1.0.0.1")
        and RemotePort == 443
        and (RemoteUrl has "cloudflare-dns.com" or RemoteUrl has "dns-query")
    | project TimeGenerated, DeviceName, RemoteIP, RemotePort, RemoteUrl,
             InitiatingProcessFileName, InitiatingProcessCommandLine, ActionType
    | summarize
        ConnectionCount = count(),
        FirstSeen = min(TimeGenerated),
        LastSeen = max(TimeGenerated),
        Processes = make_set(InitiatingProcessFileName)
      by DeviceName
    | order by ConnectionCount desc

- platform: kql
  category: user_agent
  table: DeviceNetworkEvents
  description: Suspicious User-Agent strings associated with Dohdoor
  query: |-
    DeviceNetworkEvents
    | where AdditionalFields has "insomnia/11.3.0"
        or AdditionalFields has "curl/7.88"
        or AdditionalFields has "curl/7.83.1"
    | project TimeGenerated, DeviceName, RemoteIP, RemotePort, RemoteUrl,
             InitiatingProcessFileName, AdditionalFields
    | order by TimeGenerated asc

- platform: kql
  category: email
  table: EmailUrlInfo
  description: Dohdoor C2 domains in email URLs
  query: |-
    EmailUrlInfo
    | where Url has "mswinsoftupload.design"
        or Url has "deepinspectionsystem.online"
        or Url has "pnuisckmhwagzvdyjrlbeft.software"
    | join kind=inner EmailEvents on NetworkMessageId
    | project TimeGenerated, SenderFromAddress, RecipientEmailAddress, Subject,
             Url, DeliveryAction
    | order by TimeGenerated asc

- platform: kql
  category: email
  table: UrlClickEvents
  description: User clicks on Dohdoor C2 URLs in emails
  query: |-
    UrlClickEvents
    | where Url has "mswinsoftupload.design"
        or Url has "deepinspectionsystem.online"
        or Url has "pnuisckmhwagzvdyjrlbeft.software"
    | project TimeGenerated, AccountUpn, Url, ActionType, IsClickedThrough,
             NetworkMessageId
    | order by TimeGenerated asc

- platform: kql
  category: threat
  table: DeviceNetworkEvents
  description: Beaconing interval analysis for Dohdoor C2 IPs
  query: |-
    let c2_domains = dynamic([
        "mswinsoftupload.design", "deepinspectionsystem.online",
        "pnuisckmhwagzvdyjrlbeft.software"
    ]);
    DeviceNetworkEvents
    | where RemoteUrl has_any (c2_domains)
    | order by DeviceName, TimeGenerated asc
    | extend PrevTime = prev(TimeGenerated, 1, datetime(null))
    | extend IntervalSec = datetime_diff("second", TimeGenerated, PrevTime)
    | where isnotnull(IntervalSec)
    | summarize
        ConnectionCount = count(),
        AvgIntervalSec = round(avg(IntervalSec), 1),
        StdevInterval = round(stdev(IntervalSec), 1),
        MinInterval = min(IntervalSec),
        MaxInterval = max(IntervalSec)
      by DeviceName, RemoteUrl, RemotePort
    | extend BeaconingScore = round(1.0 - (StdevInterval / (AvgIntervalSec + 1)), 2)
    | order by BeaconingScore desc

- platform: kql
  category: threat
  table: DeviceRegistryEvents
  description: Persistence — registry modifications by sideloading hosts
  query: |-
    let sideload_hosts = dynamic([
        "Fondue.exe", "mblctr.exe", "ScreenClippingHost.exe",
        "OpenWith.exe", "wksprt.exe", "ImagingDevices.exe", "wab.exe"
    ]);
    DeviceRegistryEvents
    | where InitiatingProcessFileName in~ (sideload_hosts)
    | project TimeGenerated, DeviceName, ActionType, RegistryKey, RegistryValueName,
             RegistryValueData, InitiatingProcessFileName, InitiatingProcessCommandLine
    | order by TimeGenerated asc

- platform: kql
  category: timeline
  table: union
  description: Unified Dohdoor activity timeline across all signal sources
  query: |-
    let dohdoor_hashes = dynamic([
        "54e18978c6405f56cd59ba55a62291436639f21cf325ae509f0599b15e8f7f53",
        "0bb130b1fafb17705d31fe5dd25e7b2d62176578609d75cc57911ef5582ef17a",
        "54545fa3a2d8da6746021812ebaa9d26f33bba4f63c6f7f35caa6fa4ee8c0e6a",
        "8e97c677aec905152f8a92fed50bb84ef2e8985d5c29330c5a05a4a2afcbd4a5",
        "800faaf15d5f42f2ab2c1d2b6b65c8a9e4def6dc10f6ce4e269dcf23f4e8dae2",
        "b1bd8f7d4488977cca03954a57f5c8ad7bfd4609bcc3bae92326830fcbd3232c",
        "2ce3e75997f89b98dd280d164a5f21f7565f4de26eed61243badde04b480700e"
    ]);
    let c2_domains = dynamic([
        "mswinsoftupload.design", "deepinspectionsystem.online",
        "pnuisckmhwagzvdyjrlbeft.software"
    ]);
    let sideload_dlls = dynamic(["propsys.dll", "batmeter.dll"]);
    DeviceFileEvents
    | where SHA256 in (dohdoor_hashes)
    | project TimeGenerated, Source="FileEvent", DeviceName,
             Detail=strcat(ActionType, " ", FileName, " [", FolderPath, "]")
    | union (
        DeviceNetworkEvents
        | where RemoteUrl has_any (c2_domains)
        | project TimeGenerated, Source="C2Network", DeviceName,
                 Detail=strcat(InitiatingProcessFileName, " -> ", RemoteUrl, ":", tostring(RemotePort))
    )
    | union (
        DeviceImageLoadEvents
        | where FileName in~ (sideload_dlls)
        | project TimeGenerated, Source="DLLLoad", DeviceName,
                 Detail=strcat(InitiatingProcessFileName, " loaded ", FileName, " [", FolderPath, "]")
    )
    | union (
        DeviceNetworkEvents
        | where RemoteIP in ("1.1.1.1", "1.0.0.1") and RemotePort == 443
        | project TimeGenerated, Source="DoH", DeviceName,
                 Detail=strcat(InitiatingProcessFileName, " -> ", RemoteIP, " (DoH)")
    )
    | order by TimeGenerated asc
